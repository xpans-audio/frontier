name: "macOS (pnpm)"

on: workflow_dispatch

jobs:
  build:
    name: "Build macOS"
    runs-on: macos-latest
    environment: "macOS Sign and Notarize"
    strategy:
      matrix:
        arch: [aarch64, x86_64]
    steps:
      - name: "Setup Rust toolchain"
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.arch }}-apple-darwin

      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: "Setup Node.js"
        uses: actions/setup-node@v6.4.0
        with:
          cache: "pnpm"

      - name: "Install dependencies"
        run: pnpm install

      - name: Import App Store Connect API Key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          echo $APPLE_API_KEY_BASE64 | base64 --decode > AppStoreConnect.p8
          APPLE_API_KEY_PATH=$(realpath AppStoreConnect.p8)
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> $GITHUB_ENV

      - name: "Build for ${{ matrix.arch }}"
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLICATION_CERT }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLICATION_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLICATION_CERT_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          pnpm tauri build --target ${{ matrix.arch }}-apple-darwin
          rm $APPLE_API_KEY_PATH

      - uses: actions/upload-artifact@v7
        with:
          name: macOS-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.arch }}-apple-darwin/release/bundle/dmg/*.dmg
          compression-level: 0
